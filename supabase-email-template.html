<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Pick6 Verification Code</title>
</head>
<body style="margin:0;padding:0;background-color:#0d0d0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0d0d0f;min-height:100vh;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="420" cellpadding="0" cellspacing="0" style="background-color:#1a1a1e;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);">
          <!-- Red accent bar -->
          <tr>
            <td style="height:4px;background:linear-gradient(90deg,#e63946,#c1121f);"></td>
          </tr>
          <!-- Logo area -->
          <tr>
            <td align="center" style="padding:36px 32px 20px 32px;">
              <div style="font-size:28px;font-weight:900;letter-spacing:3px;color:#ffffff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">PICK6</div>
              <div style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-top:4px;font-weight:600;">SPORTS PREDICTIONS</div>
            </td>
          </tr>
          <!-- Divider -->
          <tr>
            <td style="padding:0 32px;">
              <div style="height:1px;background:rgba(255,255,255,0.06);"></div>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:28px 32px 12px 32px;">
              <p style="color:rgba(255,255,255,0.5);font-size:14px;line-height:1.5;margin:0 0 24px 0;">Enter this code to verify your email and access your account:</p>
              <!-- OTP Code -->
              <div style="background:rgba(230,57,70,0.08);border:1.5px solid rgba(230,57,70,0.25);border-radius:14px;padding:20px;text-align:center;margin-bottom:24px;">
                <div style="font-size:36px;font-weight:900;letter-spacing:12px;color:#ffffff;font-family:'Courier New',monospace;">{{ .Token }}</div>
              </div>
              <p style="color:rgba(255,255,255,0.3);font-size:13px;line-height:1.5;margin:0 0 8px 0;">This code expires in 10 minutes. If you didn't request this, you can safely ignore this email.</p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 32px 28px 32px;">
              <div style="height:1px;background:rgba(255,255,255,0.06);margin-bottom:20px;"></div>
              <p style="color:rgba(255,255,255,0.15);font-size:11px;line-height:1.5;margin:0;text-align:center;">Pick6 Sports Predictions<br/>Do not share this code with anyone.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
